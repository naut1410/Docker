name: CI/CD Docker Push

# 1. Chạy workflow mỗi khi có code mới được push lên nhánh main
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Bước 2: Lấy code từ GitHub về máy ảo của GitHub Actions
      - name: Checkout code
        uses: actions/checkout@v4

      # Bước 3: Đăng nhập vào Docker Hub bằng Secrets đã tạo
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Bước 4: Build và Push Image
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Gắn tag: latest và tag theo mã commit (để dễ quản lý)
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/docker:latest
            ${{ secrets.DOCKER_USERNAME }}/docker:${{ github.sha }}
